version: '3.8'
services:
  
  manejador_reportes:
    build: ./manejador_reportes
    ports:
      - "8001:8001"
    env_file:
      - .env
    restart: always
  email_worker:
    build: ./workers
    env_file:
      - .env
    restart: always
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    restart: always
