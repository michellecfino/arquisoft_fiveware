services:
  # La Base de Datos
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: michi1234
    ports:
      - "5432:5432"
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  # El Broker de Mensajes
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"   # Puerto de mensajes
      - "15672:15672" # Dashboard (usuario/pass: guest/guest)


  manejador_reportes:
    build: ./manejador_reportes
    ports:
      - "8001:8001"
    environment:
      DB_HOST: db
      RABBIT_HOST: rabbitmq
    depends_on:
      - db
      - rabbitmq

  # El Worker de Email (El que procesa)
  email_worker:
    build: ./workers
    environment:
      RABBIT_HOST: rabbitmq
    depends_on:
      - rabbitmq
      # El API Gateway (Kong)
  kong:
    image: kong:latest
    volumes:
      - /home/ubuntu/arquisoft_fiveware/kong.yml:/usr/local/kong/declarative/kong.yml
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: "/usr/local/kong/declarative/kong.yml"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000:8000" # Por aquí entrará JMeter
    depends_on:
      - manejador_reportes
