_format_version: "3.0"
_transform: true

services:
  - name: manejador-service
    url: http://manejador_reportes:8001
    routes:
      - name: reportes-route
        paths:
          - /reporte-mensual
        strip_path: false

  - name: rabbitmq-mgmt-service
    url: http://rabbitmq:15672
    routes:
      - name: rabbitmq-mgmt-route
        paths:
          - /rabbitmq-admin
