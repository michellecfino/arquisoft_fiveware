version: '3.8'
services:
  
  manejador_reportes:
    build: ./manejador_reportes
    ports:
      - "8001:8001"
    environment:
    
      DB_HOST: ${DATABASE_URL} 
      RABBIT_HOST: ${RABBITMQ_URL}
    restart: always

  email_worker:
    build: ./workers
    environment:
      RABBIT_HOST: ${RABBITMQ_URL}
    restart: always